<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>QuickChat</title>
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    #loginScreen {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      max-height: 750px;
      background: #17212b;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-radius: 12px;
      padding: 20px;
    }
    #loginScreen h2 {
      color: #fff;
      margin-bottom: 20px;
    }
    #loginScreen input {
      width: 100%;
      background: #242f3d;
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      color: #fff;
      font-size: 16px;
      outline: none;
      margin-bottom: 12px;
    }
    #loginScreen button {
      width: 100%;
      background: #5eb5f7;
      border: none;
      border-radius: 10px;
      padding: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    #app {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      max-height: 750px;
      background: #17212b;
      display: none;
      flex-direction: column;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }
    #header {
      background: #1f2c38;
      padding: 12px 16px;
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #2a3a45;
    }
    #header .back-btn {
      background: none;
      border: none;
      color: #5eb5f7;
      font-size: 20px;
      cursor: pointer;
    }
    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    #chatList {
      width: 100%;
      background: #17212b;
      overflow-y: auto;
      flex-shrink: 0;
      transition: transform 0.3s;
    }
    #chatList.show-chat {
      transform: translateX(-100%);
    }
    .chat-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      gap: 12px;
      cursor: pointer;
      border-bottom: 1px solid #1f2c38;
      transition: background 0.15s;
    }
    .chat-item:active {
      background: #1f2c38;
    }
    .avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
      color: #fff;
      flex-shrink: 0;
    }
    .chat-info {
      flex: 1;
      min-width: 0;
    }
    .chat-name {
      color: #fff;
      font-size: 16px;
      font-weight: 500;
    }
    .chat-last {
      color: #7f8c8d;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-time {
      color: #5eb5f7;
      font-size: 12px;
      flex-shrink: 0;
    }
    #chatWindow {
      width: 100%;
      background: #0e1621;
      display: flex;
      flex-direction: column;
      position: absolute;
      top: 50px;
      left: 0;
      right: 0;
      bottom: 0;
      transform: translateX(100%);
      transition: transform 0.3s;
    }
    #chatWindow.active {
      transform: translateX(0);
    }
    #chatHeader {
      background: #1f2c38;
      padding: 12px 16px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #2a3a45;
    }
    #messages {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.4;
      word-wrap: break-word;
      position: relative;
      animation: fadeIn 0.2s;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg.incoming {
      background: #1f2c38;
      color: #fff;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .msg.outgoing {
      background: #2b5278;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .msg .sender {
      font-size: 11px;
      color: #5eb5f7;
      margin-bottom: 3px;
      font-weight: 500;
    }
    .msg .time {
      font-size: 10px;
      color: #7f8c8d;
      text-align: right;
      margin-top: 4px;
    }
    #inputArea {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      background: #1f2c38;
      gap: 8px;
      border-top: 1px solid #2a3a45;
    }
    #inputArea input {
      flex: 1;
      background: #242f3d;
      border: none;
      border-radius: 20px;
      padding: 10px 16px;
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    #inputArea input::placeholder {
      color: #5a6a7a;
    }
    #inputArea button {
      background: #5eb5f7;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #newChatArea {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      background: #17212b;
      gap: 8px;
      border-bottom: 1px solid #1f2c38;
    }
    #newChatArea input {
      flex: 1;
      background: #242f3d;
      border: none;
      border-radius: 20px;
      padding: 8px 14px;
      color: #fff;
      font-size: 13px;
      outline: none;
    }
    #newChatArea button {
      background: #5eb5f7;
      border: none;
      border-radius: 50%;
      width: 34px;
      height: 34px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
    }
    #logoutBtn {
      background: none;
      border: none;
      color: #e74c3c;
      font-size: 14px;
      cursor: pointer;
      margin-left: auto;
    }
  </style>
</head>
<body>

<!-- Экран входа -->
<div id="loginScreen">
  <h2>🚀 QuickChat</h2>
  <input type="text" id="loginName" placeholder="Твой никнейм...">
  <button onclick="login()">Войти в чат</button>
</div>

<!-- Основной интерфейс -->
<div id="app">
  <div id="header">
    <button class="back-btn" onclick="closeChat()">←</button>
    <span id="headerTitle">QuickChat</span>
    <button id="logoutBtn" onclick="logout()">Выйти</button>
  </div>
  
  <div id="newChatArea">
    <input type="text" id="newChatInput" placeholder="Никнейм собеседника...">
    <button onclick="createChat()">+</button>
  </div>

  <div id="main">
    <div id="chatList"></div>
    <div id="chatWindow">
      <div id="chatHeader"></div>
      <div id="messages"></div>
      <div id="inputArea">
        <input type="text" id="msgInput" placeholder="Сообщение..." onkeydown="if(event.key==='Enter')sendMessage()">
        <button onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ---- Инициализация Firebase ----
  const firebaseConfig = {
    apiKey: "AIzaSyC6OVfukzGjUK3d6PMdITzwo-qkUV_DrLU",
    authDomain: "quickchat-5652e.firebaseapp.com",
    projectId: "quickchat-5652e",
    storageBucket: "quickchat-5652e.firebasestorage.app",
    messagingSenderId: "945780684384",
    appId: "1:945780684384:web:46fe8c32cee6d5e23ef505",
    measurementId: "G-W651WRJKER"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  let myNickname = '';
  let currentChatId = null;
  let currentChatUser = null;

  // ---- Вход ----
  function login() {
    const name = document.getElementById('loginName').value.trim();
    if (!name) return alert('Введи никнейм!');
    myNickname = name;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('headerTitle').textContent = 'QuickChat — ' + myNickname;
    loadChats();
  }

  function logout() {
    myNickname = '';
    currentChatId = null;
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    document.getElementById('loginName').value = '';
  }

  // ---- Создание чата ----
  async function createChat() {
    const otherUser = document.getElementById('newChatInput').value.trim();
    if (!otherUser) return alert('Введи никнейм собеседника!');
    if (otherUser === myNickname) return alert('Нельзя создать чат с самим собой!');

    const chatId = [myNickname, otherUser].sort().join('_');
    
    await db.collection('chats').doc(chatId).set({
      users: [myNickname, otherUser],
      lastMsg: '',
      lastTime: ''
    }, { merge: true });

    document.getElementById('newChatInput').value = '';
    loadChats();
  }

  // ---- Загрузка списка чатов ----
  function loadChats() {
    db.collection('chats')
      .where('users', 'array-contains', myNickname)
      .onSnapshot(snapshot => {
        const list = document.getElementById('chatList');
        list.innerHTML = '';
        snapshot.forEach(doc => {
          const data = doc.data();
          const otherUser = data.users.find(u => u !== myNickname);
          const initials = otherUser.substring(0, 2).toUpperCase();
          const colors = ['#4a90d9','#e84393','#00b894','#f39c12','#6c5ce7','#fd79a8','#2ecc71','#e74c3c'];
          const color = colors[otherUser.charCodeAt(0) % colors.length];
          list.innerHTML += `
            <div class="chat-item" onclick="openChat('${doc.id}', '${otherUser}')">
              <div class="avatar" style="background:${color}">${initials}</div>
              <div class="chat-info">
                <div class="chat-name">${otherUser}</div>
                <div class="chat-last">${data.lastMsg || 'Нет сообщений'}</div>
              </div>
              <div class="chat-time">${data.lastTime || ''}</div>
            </div>
          `;
        });
      });
  }

  // ---- Открыть чат ----
  function openChat(chatId, otherUser) {
    currentChatId = chatId;
    currentChatUser = otherUser;
    document.getElementById('chatHeader').innerHTML = `<span>💬 ${otherUser}</span>`;
    document.getElementById('headerTitle').textContent = otherUser;
    document.querySelector('.back-btn').style.display = 'block';
    document.getElementById('chatList').classList.add('show-chat');
    document.getElementById('chatWindow').classList.add('active');
    loadMessages();
    document.getElementById('msgInput').focus();
  }

  function closeChat() {
    currentChatId = null;
    currentChatUser = null;
    document.getElementById('headerTitle').textContent = 'QuickChat — ' + myNickname;
    document.querySelector('.back-btn').style.display = 'none';
    document.getElementById('chatList').classList.remove('show-chat');
    document.getElementById('chatWindow').classList.remove('active');
  }

  // ---- Загрузка сообщений ----
  function loadMessages() {
    if (!currentChatId) return;
    db.collection('chats').doc(currentChatId).collection('messages')
      .orderBy('timestamp', 'asc')
      .onSnapshot(snapshot => {
        const container = document.getElementById('messages');
        container.innerHTML = '';
        snapshot.forEach(doc => {
          const m = doc.data();
          const isMine = m.sender === myNickname;
          container.innerHTML += `
            <div class="msg ${isMine ? 'outgoing' : 'incoming'}">
              ${isMine ? '' : '<div class="sender">' + m.sender + '</div>'}
              ${m.text}
              <div class="time">${m.time}</div>
            </div>
          `;
        });
        container.scrollTop = container.scrollHeight;
      });
  }

  // ---- Отправить сообщение ----
  async function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text || !currentChatId) return;

    const now = new Date();
    const time = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

    await db.collection('chats').doc(currentChatId).collection('messages').add({
      sender: myNickname,
      text: text,
      time: time,
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });

    await db.collection('chats').doc(currentChatId).update({
      lastMsg: text,
      lastTime: time
    });

    input.value = '';
  }
</script>
</body>
</html>
